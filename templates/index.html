<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pragma — Gestionale Commerciale</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="/static/style.css?v=10">
  <link rel="stylesheet" href="/static/css/pragma-design-system.css?v=1">
</head>
<body>
<div class="app">

  <!-- ─── SIDEBAR PRAGMA ─── -->
  <aside class="pragma-sidebar">
    <!-- Logo -->
    <div class="pragma-sidebar-logo">
      <svg width="32" height="32" viewBox="0 0 120 120">
        <rect width="120" height="120" rx="16" fill="#009FE3"/>
        <rect x="22" y="30" width="76" height="10" rx="5" fill="white"/>
        <rect x="32" y="40" width="10" height="48" rx="5" fill="white"/>
        <rect x="78" y="40" width="10" height="48" rx="5" fill="white"/>
      </svg>
      <div>
        <span class="pragma-logo-name">PRAGMA</span>
        <span class="pragma-logo-sub">Gestionale Offerte</span>
      </div>
    </div>

    <div class="pragma-sidebar-section">
      <!-- MENU -->
      <div class="pragma-sidebar-label">Menu</div>
      <div class="pragma-nav-item" data-view="admin" onclick="navigate('admin')">
        <i data-lucide="bar-chart-2" style="width:16px;height:16px"></i> Dashboard
      </div>
      <div class="pragma-nav-item active" data-view="dashboard" onclick="navigate('dashboard')">
        <i data-lucide="layout-dashboard" style="width:16px;height:16px"></i> Riepilogo Offerte
      </div>
      <div class="pragma-nav-item" onclick="window.location.href='/generatore'">
        <i data-lucide="zap" style="width:16px;height:16px;color:#f59e0b"></i> Generatore IA
      </div>

      <!-- GESTIONE -->
      <div class="pragma-sidebar-label">Gestione</div>
      <div class="pragma-nav-item" data-view="clienti" onclick="navigate('clienti')">
        <i data-lucide="users" style="width:16px;height:16px"></i> Anagrafica Clienti
      </div>
      <div class="pragma-nav-item" onclick="window.location.href='/prodotti'">
        <i data-lucide="package" style="width:16px;height:16px"></i> Prodotti
      </div>
      <div class="pragma-nav-item" data-view="agenti" onclick="navigate('agenti')">
        <i data-lucide="briefcase" style="width:16px;height:16px"></i> Agenti
        <span id="sidebar-att-badge" style="display:none;margin-left:auto;background:#ef4444;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px"></span>
      </div>
      <div class="pragma-nav-item" onclick="window.location.href='/segnalatori'">
        <i data-lucide="megaphone" style="width:16px;height:16px"></i> Segnalatori
      </div>

      <!-- SISTEMA -->
      <div class="pragma-sidebar-label">Sistema</div>
      <div class="pragma-nav-item" onclick="window.location.href='/impostazioni'">
        <i data-lucide="settings" style="width:16px;height:16px"></i> Impostazioni
      </div>
    </div>

    <div class="pragma-sidebar-footer">
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.3);margin-bottom:4px">Azienda</div>
      <div style="font-size:13px;font-weight:700;color:#fff">Ulteria S.r.l.</div>
      <div style="font-size:10px;color:rgba(255,255,255,.35);margin-top:2px">ESCo UNI CEI 11352</div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <div class="main">
    <div class="topbar">
      <div class="bc">
        <i data-lucide="home" style="width:14px;height:14px"></i>
        <span class="bc-sep">/</span>
        <strong id="bc-title">Riepilogo Offerte</strong>
      </div>
      <div class="topbar-right">
        <span style="font-size:.73rem;color:var(--muted)" id="topbar-info"></span>
      </div>
    </div>

    <div class="content" id="content">
      <!-- Views rendered by JS -->
    </div>
  </div>
</div>

<script src="/static/app.js?v=54"></script>
</body>
</html>
