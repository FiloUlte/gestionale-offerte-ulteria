// VIEW: Lettura Consumi
// ═══════════════════════════════════════════════════
function viewLetture(){
  var c=STATE.condo;
  if(!Object.keys(UNITA).length) return '<div><div class="kicker">'+c.id+' · '+c.nome+'</div><h1 class="page-title">Lettura Consumi</h1><div class="alert a-info mt16">Nessuna unità mappata. <a href="#" onclick="nav(\'mappatura\');return false" style="color:var(--blue)">Vai alla mappatura</a> per iniziare.</div></div>';
  var st=STAGIONI[STATE.season]||{tot:0,combustibile:0,elettricita:0,accessori:0,quota_fissa_pct:30,q_fissa:0,q_consumo:0,mill_tot:1000,punti_lordi:0,punti_netti:0,costo_mill:0,costo_punto:0};
  var uKeys=Object.keys(UNITA);
  var letture=LETTURE[STATE.season]||{};
  var letture_prev=LETTURE[String(parseInt(STATE.season)-1)]||{};
  var scuro=isRipScuro();
  var hasRip=condoHasRipartitori();
  var hasDiretti=c.dispositivi&&c.dispositivi.some(function(d){return d!=='ripartitore';});
  var isMisto=hasRip&&hasDiretti;

  // ── Classify rows by family ──
  var ripRows=[], direttiRows=[];
  var groupIdx=0;
  uKeys.forEach(function(uk){
    var u=UNITA[uk]; var devs=MAPPATURA[uk]||[];
    var ripDevs=devs.filter(function(d){return isRipartitore(d.tipo_disp);});
    var dirDevs=devs.filter(function(d){return !isRipartitore(d.tipo_disp);});
    ripDevs.forEach(function(d,i){
      var disp=letture[d.ser]||0;
      var kc=KC[d.ser]||0;
      var cf=scuro?Math.round(disp*kc):disp;
      ripRows.push({uk:uk,u:u,d:d,disp:disp,kc:kc,cf:cf,
        isFirst:i===0,isLast:i===ripDevs.length-1,groupLen:ripDevs.length,gIdx:groupIdx});
    });
    if(ripDevs.length) groupIdx++;
    dirDevs.forEach(function(d,i){
      var att=letture[d.ser]||0;
      var prec=letture_prev[d.ser]||0;
      var delta=att-prec;
      var udm=UDM_SERVIZIO[d.tipo_disp]||'';
      direttiRows.push({uk:uk,u:u,d:d,att:att,prec:prec,delta:delta,udm:udm,
        isFirst:i===0,isLast:i===dirDevs.length-1,groupLen:dirDevs.length,gIdx:groupIdx});
    });
    if(dirDevs.length) groupIdx++;
  });

  // Group totals for ripartitori
  var groupTot={};
  uKeys.forEach(function(uk){
    var devs=(MAPPATURA[uk]||[]).filter(function(d){return isRipartitore(d.tipo_disp);});
    var t=0;
    devs.forEach(function(d){var disp=(letture[d.ser]||0);t+=scuro?Math.round(disp*(KC[d.ser]||0)):disp;});
    groupTot[uk]=t;
  });

  if(!STATE.lettureTab) STATE.lettureTab='rip';

  // ── PDF header ──
  var pdfHeader='<div class="pdf-header"><div class="pdf-logo-area"><img src="'+LOGO_LIGHT+'" style="height:42px" alt="Ulteria"></div>'+
    '<div><div class="pdf-doc-title">Lettura Consumi</div><div class="pdf-doc-sub">'+c.nome+' · '+STATE.season+'</div></div></div>';

  // ── Hero header ──
  var hero='<div style="background:linear-gradient(135deg,#0D1F35 0%,#005F8A 100%);border-radius:14px;padding:20px 26px;margin-bottom:18px;color:#fff">'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:20px;align-items:start">'+
      '<div>'+
        '<div style="font-size:.7rem;color:rgba(255,255,255,.6);margin-bottom:5px">Condominio</div>'+
        '<div style="font-size:1.1rem;font-weight:800;margin-bottom:3px">'+c.nome+'</div>'+
        '<div style="font-size:.85rem;color:rgba(255,255,255,.6)">'+c.via+', '+c.loc+'</div>'+
      '</div>'+
      '<div>'+
        '<div style="font-size:.7rem;color:rgba(255,255,255,.6);margin-bottom:5px">Amministrazione</div>'+
        '<div style="font-size:1rem;font-weight:700;margin-bottom:3px">'+c.admin+'</div>'+
        '<div style="font-size:.85rem;color:rgba(255,255,255,.6)">'+c.admin_via+', '+c.admin_loc+'</div>'+
      '</div>'+
      '<div style="text-align:right">'+
        '<div style="font-size:.7rem;color:rgba(255,255,255,.6);margin-bottom:5px">Stagione '+STATE.season+'</div>'+
        '<div style="font-size:1.1rem;font-weight:800;margin-bottom:3px">Gennaio–Dicembre '+STATE.season+'</div>'+
        '<div style="font-size:.85rem;color:rgba(255,255,255,.6)">'+
          (TIPI_IMPIANTO.filter(function(t){return t.id===c.impianto;})[0]||{}).label+
          (hasRip?' · '+(scuro?'Scuro':'Chiaro'):'')+
          ' · '+c.n_disp+' dispositivi</div>'+
      '</div>'+
    '</div>'+
  '</div>';

  // ═══ Tabella ripartitori ═══
  function tblRipartitori(){
    return '<div style="border:1px solid #0D1F35;border-radius:10px;overflow:hidden">'+
      '<table style="width:100%;border-collapse:collapse">'+
        '<thead><tr style="background:#0D1F35">'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:100px">Seriale</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none">Locale</th>'+
          (scuro?
            '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:60px">Display</th>'+
            '<th style="text-align:left;color:rgba(255,255,255,.65);font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:55px">KC</th>'+
            '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:70px">Consumo</th>'
          :'<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:80px">Consumo</th>')+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:70px">Cod. app.</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none">Utente</th>'+
          '<th style="text-align:center;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:70px">Totale</th>'+
        '</tr></thead>'+
        (function(){
          var html='',currentGroup=null,rows=[];
          ripRows.forEach(function(item){
            if(item.isFirst && currentGroup!==null){
              html+='<tbody style="page-break-inside:avoid;break-inside:avoid">'+rows.join('')+'</tbody>';rows=[];
            }
            currentGroup=item.uk;
            var isZero=item.disp===0;
            var grpBg=item.gIdx%2===0?'#fff':'#f4f9fd';
            var borderStyle=item.isLast?'border-bottom:1px solid #0D1F35':'border-bottom:1px solid '+(item.gIdx%2===0?'#edf1f5':'#e4eaef');
            var ser=String(item.d.ser);
            var row='<tr style="background:'+grpBg+';'+borderStyle+'">';
            row+='<td style="padding:6px 10px;font-size:.8rem;color:'+(isZero?'var(--orange)':'var(--mid)')+'">'+ser+'</td>';
            row+='<td style="padding:6px 10px;font-size:.85rem;font-weight:500;color:var(--mid)">'+item.d.locale+'</td>';
            if(scuro){
              row+='<td style="padding:6px 10px;font-size:.85rem;font-weight:700;color:'+(isZero?'var(--orange)':'var(--mid)')+'">'+
                ec(isZero?'0':item.disp,'LETTURE.'+STATE.season+'.'+ser,'number')+'</td>';
              row+='<td style="padding:6px 10px;font-size:.78rem;color:var(--muted)">'+item.kc.toFixed(4)+'</td>';
              row+='<td style="padding:6px 10px;font-size:.85rem;font-weight:700;color:var(--mid)">'+(isZero?'—':n(item.cf))+'</td>';
            }else{
              row+='<td style="padding:6px 10px;font-size:.85rem;font-weight:700;color:'+(isZero?'var(--orange)':'var(--mid)')+'">'+
                ec(isZero?'0':item.disp,'LETTURE.'+STATE.season+'.'+ser,'number')+'</td>';
            }
            if(item.isFirst){
              row+='<td rowspan="'+item.groupLen+'" style="vertical-align:middle;padding:6px 12px;background:'+grpBg+';border-left:1px solid #0D1F35">'+
                '<div style="font-size:.85rem;font-weight:700;color:var(--mid)">'+item.uk+'</div></td>';
              row+='<td rowspan="'+item.groupLen+'" style="vertical-align:middle;padding:6px 10px;background:'+grpBg+'">'+
                '<div style="font-size:.88rem;font-weight:700;color:var(--mid)">'+item.u.nome+'</div>'+
                '<div style="font-size:.72rem;color:var(--muted);margin-top:2px">'+(item.u.scala?'Sc.'+item.u.scala+' · ':'')+item.u.piano+'</div></td>';
              row+='<td rowspan="'+item.groupLen+'" style="vertical-align:middle;padding:6px 10px;background:'+grpBg+';text-align:center">'+
                '<div style="font-size:1rem;font-weight:900;color:var(--blue)">'+n(groupTot[item.uk])+'</div></td>';
            }
            row+='</tr>';rows.push(row);
          });
          if(rows.length) html+='<tbody style="page-break-inside:avoid;break-inside:avoid">'+rows.join('')+'</tbody>';
          return html;
        })()+
      '</table>'+
      '<div style="padding:10px 14px;background:#0D1F35;display:flex;justify-content:flex-end;gap:24px;align-items:center">'+
        [['Ripartitori',ripRows.length],['Unità',uKeys.length],['Cons. netto',n(st.punti_netti)]].map(function(t,i){
          return '<div style="text-align:left"><div style="font-size:.7rem;color:rgba(255,255,255,.55);margin-bottom:2px">'+t[0]+'</div>'+
            '<div style="font-size:'+(i===2?'1rem':'.88rem')+';font-weight:'+(i===2?'900':'600')+';color:#fff">'+t[1]+'</div></div>';
        }).join('')+
      '</div>'+
    '</div>';
  }

  // ═══ Tabella contatori diretti ═══
  function tblDiretti(){
    return '<div style="border:1px solid #0D1F35;border-radius:10px;overflow:hidden">'+
      '<table style="width:100%;border-collapse:collapse">'+
        '<thead><tr style="background:#0D1F35">'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:70px">Cod. app.</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none">Utente</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:60px">Servizio</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none">Locale</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:90px">Matricola</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:40px">Ruolo</th>'+
          '<th style="text-align:right;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:80px">Prec. '+(parseInt(STATE.season)-1)+'</th>'+
          '<th style="text-align:right;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:80px">Attuale '+STATE.season+'</th>'+
          '<th style="text-align:right;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:80px">Consumo</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;padding:9px 10px;border:none;width:40px">UdM</th>'+
        '</tr></thead>'+
        '<tbody>'+
          direttiRows.map(function(r,i){
            var grpBg=r.gIdx%2===0?'#fff':'#f4f9fd';
            var borderStyle=r.isLast?'border-bottom:1px solid #0D1F35':'border-bottom:1px solid #edf1f5';
            var roleLabel={autonomo:'A',master:'M',slave:'S'};
            var roleColor={autonomo:'var(--muted)',master:'var(--blue)',slave:'var(--orange)'};
            return '<tr style="background:'+grpBg+';'+borderStyle+'">'+
              (r.isFirst?
                '<td rowspan="'+r.groupLen+'" style="vertical-align:middle;padding:6px 10px;background:'+grpBg+';font-size:.85rem;font-weight:700;color:var(--mid);border-right:1px solid #0D1F35">'+r.uk+'</td>'+
                '<td rowspan="'+r.groupLen+'" style="vertical-align:middle;padding:6px 10px;background:'+grpBg+'">'+
                  '<div style="font-size:.88rem;font-weight:700;color:var(--mid)">'+r.u.nome+'</div>'+
                  '<div style="font-size:.72rem;color:var(--muted)">'+(r.u.scala?'Sc.'+r.u.scala+' · ':'')+r.u.piano+'</div></td>'
              :'')+
              '<td style="padding:6px 10px">'+devIcon(r.d.tipo_disp,12)+'</td>'+
              '<td style="padding:6px 10px;font-size:.82rem;color:var(--mid)">'+r.d.locale+'</td>'+
              '<td style="padding:6px 10px;font-size:.8rem;color:var(--mid)">'+(r.d.device_role==='slave'?'<span style="font-size:.6rem;color:var(--orange);vertical-align:super" title="Stessa matricola del master">↳</span> ':'')+r.d.ser+'</td>'+
              '<td style="padding:6px 10px;text-align:center" title="'+(r.d.device_role==='autonomo'?'Dispositivo indipendente':r.d.device_role==='master'?'Dispositivo master — gestisce ingressi secondari':'Misura derivata da master S/N '+(r.d.master_ser||'?')+' ('+({diretto:'lettura diretta',impulso:'ingresso a impulsi',derivato:'misura derivata'}[r.d.acq_misura]||'')+')' )+'">'+
                '<span style="font-size:.68rem;font-weight:800;color:'+roleColor[r.d.device_role||'autonomo']+'">'+roleLabel[r.d.device_role||'autonomo']+'</span>'+
                (r.d.device_role==='slave'?'<div style="font-size:.58rem;color:var(--muted);margin-top:1px">'+({impulso:'imp.',derivato:'der.',diretto:'dir.'}[r.d.acq_misura]||'')+'</div>':'')+
              '</td>'+
              '<td style="padding:6px 10px;text-align:right;font-size:.82rem;color:var(--muted)">'+n(r.prec)+'</td>'+
              '<td style="padding:6px 10px;text-align:right;font-size:.85rem;font-weight:700;color:var(--mid)">'+
                ec(r.att,'LETTURE.'+STATE.season+'.'+r.d.ser,'number')+'</td>'+
              '<td style="padding:6px 10px;text-align:right;font-size:.88rem;font-weight:800;color:var(--blue)">'+n(r.delta)+'</td>'+
              '<td style="padding:6px 10px;font-size:.78rem;color:var(--muted)">'+r.udm+'</td>'+
            '</tr>';
          }).join('')+
          (!direttiRows.length?'<tr><td colspan="10" style="padding:24px;text-align:center;color:var(--muted)">Nessuna lettura contatori disponibile</td></tr>':'')+
        '</tbody>'+
      '</table>'+
      '<div style="padding:10px 14px;background:#0D1F35;display:flex;justify-content:flex-end;gap:24px;align-items:center">'+
        [['Contatori',direttiRows.length],['Unità',uKeys.length]].map(function(t){
          return '<div style="text-align:left"><div style="font-size:.7rem;color:rgba(255,255,255,.55);margin-bottom:2px">'+t[0]+'</div>'+
            '<div style="font-size:.88rem;font-weight:600;color:#fff">'+t[1]+'</div></div>';
        }).join('')+
      '</div>'+
    '</div>';
  }

  // ═══ Composizione ═══
  var tabs='';
  var tableContent='';
  if(isMisto){
    tabs='<div class="tabs" style="margin-bottom:14px">'+
      '<div class="tab'+(STATE.lettureTab==='rip'?' on':'')+'" onclick="STATE.lettureTab=\'rip\';render()">'+devIconOnly('ripartitore',13)+' Ripartitori ('+ripRows.length+')</div>'+
      '<div class="tab'+(STATE.lettureTab==='dir'?' on':'')+'" onclick="STATE.lettureTab=\'dir\';render()">'+devIconOnly('cc_risc',13)+' Contatori ('+direttiRows.length+')</div>'+
    '</div>';
    tableContent=STATE.lettureTab==='rip'?tblRipartitori():tblDiretti();
  }else if(hasRip){
    tableContent=tblRipartitori();
  }else{
    tableContent=tblDiretti();
  }

  return '<div>'+pdfHeader+hero+tabs+tableContent+'</div>';
}

// VIEW: RIPARTIZIONE GENERALE
// ═══════════════════════════════════════════════════
function viewRipartizione(){
  var c=STATE.condo;
  if(!Object.keys(UNITA).length) return '<div><div class="kicker">'+c.id+' · '+c.nome+'</div><h1 class="page-title">Ripartizione Generale</h1><div class="alert a-info mt16">Nessuna unità mappata. <a href="#" onclick="nav(\'mappatura\');return false" style="color:var(--blue)">Vai alla mappatura</a> per iniziare.</div></div>';
  var st=STAGIONI[STATE.season]||{tot:0,combustibile:0,elettricita:0,accessori:0,quota_fissa_pct:30,q_fissa:0,q_consumo:0,mill_tot:1000,punti_lordi:0,punti_netti:0,costo_mill:0,costo_punto:0};
  var rips=RIPARTO[STATE.season]||{};
  var prev_yr=String(parseInt(STATE.season)-1);
  var prev=RIPARTO[prev_yr]||{};
  var hasPrev=prev&&Object.keys(prev).length>0;
  var st_prev=STAGIONI[prev_yr]||{};
  var maxTot=Math.max.apply(null,Object.keys(UNITA).map(function(k){return (rips[k]||{}).tot||0;}))||1;

  // delta condominiale totale
  var deltaTotCondo=hasPrev&&st_prev.tot?(st.tot-st_prev.tot):0;
  var deltaTotPct=st_prev.tot?Math.round(deltaTotCondo/st_prev.tot*100):0;

  return '<div>'+
    '<div class="pdf-header"><div class="pdf-logo-area"><img src="'+LOGO_LIGHT+'" style="height:42px" alt="Ulteria"></div>'+
    '<div><div class="pdf-doc-title">Ripartizione Spese</div>'+
    '<div class="pdf-doc-sub">'+c.nome+' · '+STATE.season+'</div></div></div>'+

    // ═══ HERO HEADER (screen only) ═══
    '<div style="background:linear-gradient(135deg,#0D1F35 0%,#005F8A 100%);border-radius:14px;padding:22px 26px;margin-bottom:16px;color:#fff">'+
      '<div style="display:grid;grid-template-columns:1fr 1fr auto;gap:24px;align-items:center">'+
        // Condominio
        '<div>'+
          '<div style="font-size:.55rem;letter-spacing:.02em;color:rgba(255,255,255,.4);margin-bottom:4px">Condominio</div>'+
          '<div style="font-size:1.15rem;font-weight:800;margin-bottom:3px">'+ec(c.nome,'STATE.condo.nome','text','color:#fff')+'</div>'+
          '<div style="font-size:.78rem;color:rgba(255,255,255,.55)">'+ec(c.via,'STATE.condo.via','text','color:rgba(255,255,255,.55)')+', '+ec(c.loc,'STATE.condo.loc','text','color:rgba(255,255,255,.55)')+'</div>'+
          '<div style="font-size:.72rem;color:rgba(255,255,255,.4);margin-top:4px">Amm. '+ec(c.admin,'STATE.condo.admin','text','color:rgba(255,255,255,.4)')+'</div>'+
          '<div style="font-size:.78rem;color:rgba(255,255,255,.6);margin-top:6px">Stagione <strong style="color:#fff">'+STATE.season+'</strong> · Gennaio–Dicembre · Quota fissa '+ec(st.quota_fissa_pct,'STAGIONI.'+STATE.season+'.quota_fissa_pct','number','color:#fff')+'%</div>'+

        // Costi impianto
        '<div>'+

           ['Accessori (millesimali)','accessori']
          ].map(function(p){return '<div style="display:flex;justify-content:space-between;font-size:.74rem;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.08)">'+
            '<span style="color:rgba(255,255,255,.5)">'+p[0]+'</span>'+
            '<span style="font-weight:600;color:rgba(255,255,255,.85)">'+eceu(st[p[1]],'STAGIONI.'+STATE.season+'.'+p[1],'color:rgba(255,255,255,.85)')+'</span></div>';}).join('')+
          '<div style="display:flex;justify-content:space-between;font-size:.78rem;padding:5px 0;margin-top:4px">'+
            '<span style="color:rgba(255,255,255,.7);font-weight:700">Totale impianto</span>'+
            '<span style="font-family:inherit;font-weight:800;color:#60c8ff">'+eu(st.tot)+'</span></div>'+
        '</div>'+
        // Big total + delta
        '<div style="text-align:center;min-width:200px">'+
          '<div style="font-size:.55rem;letter-spacing:.02em;color:rgba(255,255,255,.4);margin-bottom:6px">Totale riscaldamento</div>'+
          '<div style="font-size:2.6rem;font-weight:900;font-family:inherit;color:#4ade80;letter-spacing:-.04em;line-height:1">'+eu(st.tot)+'</div>'+
          (hasPrev&&st_prev.tot?
            '<div style="display:inline-flex;align-items:center;gap:6px;margin-top:10px;padding:5px 14px;border-radius:20px;'+
              'background:'+(deltaTotCondo>0?'rgba(239,68,68,.2)':'rgba(34,197,94,.2)')+'">'+
              '<span style="font-size:1.1rem">'+(deltaTotCondo>0?'▲':'▼')+'</span>'+
              '<div style="text-align:left">'+
                '<div style="font-size:.8rem;font-weight:800;color:'+(deltaTotCondo>0?'#fca5a5':'#86efac')+'">'+(deltaTotCondo>0?'+':'')+eu(Math.abs(Math.round(deltaTotCondo*100)/100))+'</div>'+
                '<div style="font-size:.58rem;color:rgba(255,255,255,.5)">'+(deltaTotPct>0?'+':'')+deltaTotPct+'% vs '+prev_yr+'</div>'+
              '</div>'+
            '</div>':'')+
        '</div>'+
      '</div>'+
    '</div>'+

    // ═══ KPI PARAMETRI (screen only) ═══
    '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px">'+
      [['Q. fissa millesimi',eu(st.q_fissa),'var(--blue-d)'],
       ['Q. consumo letture',eu(st.q_consumo),'var(--blue)'],
       ['€/millesimo','€ '+st.costo_mill.toFixed(4),''],
       ['€/punto consumo','€ '+st.costo_punto.toFixed(4),''],
       ['Punti netti',n(st.punti_netti),'']
      ].map(function(k){return '<div style="background:var(--white);border:1px solid var(--border);border-radius:8px;padding:10px 12px;text-align:center">'+
        '<div style="font-size:.55rem;font-weight:700;letter-spacing:.02em;color:var(--muted);margin-bottom:4px">'+k[0]+'</div>'+
        '<div style="font-family:inherit;font-size:.9rem;font-weight:800;color:'+(k[2]||'var(--text)')+'">'+k[1]+'</div>'+
      '</div>';}).join('')+
    '</div>'+

    // ═══ TABELLA RIPARTIZIONE ═══
    '<div style="border:1px solid #0D1F35;border-radius:10px;overflow:hidden">'+
      '<table class="tbl" style="border-collapse:collapse">'+
        '<thead><tr style="background:#0D1F35">'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:80px">Cod.</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em">Utente</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:65px">Mill.</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:65px">Cons.</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:95px">Q.Fissa</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:100px">Q.Consumo</th>'+
          '<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:110px">Totale '+STATE.season+'</th>'+
          (hasPrev?'<th style="text-align:left;color:#fff;font-size:.75rem;font-weight:700;border:none;padding:9px 10px;letter-spacing:.01em;width:100px">Variaz. vs '+prev_yr+'</th>':'')+
        '</tr></thead>'+
        '<tbody>'+
          Object.keys(UNITA).map(function(k,idx){
            var u=UNITA[k]; var r=rips[k]||{}; var rp=prev[k]||{};
            var d=r.tot&&rp.tot?r.tot-rp.tot:null;
            var dpct=rp.tot?Math.round((r.tot-rp.tot)/rp.tot*100):null;
            var grpBg=idx%2===0?'#fff':'#f4f9fd';
            return '<tr onclick="nav(\'conteggio\',{contUnit:\''+k+'\'})" '+
              'style="cursor:pointer;background:'+grpBg+';border-bottom:1px solid #0D1F35" '+
              'onmouseover="this.style.background=\'rgba(0,159,227,.07)\'" '+
              'onmouseout="this.style.background=\''+grpBg+'\'">'+
              '<td style="padding:7px 10px"><span style="font-size:.85rem;font-weight:700;color:var(--mid)">'+k+'</span></td>'+
              '<td><div style="font-weight:700;font-size:.88rem;color:var(--mid)">'+ec(u.nome,'UNITA.'+k+'.nome','text')+'</div>'+
                '<div style="font-size:.72rem;color:var(--muted);margin-top:1px">'+(u.scala?'Sc.'+ec(u.scala,'UNITA.'+k+'.scala','text')+' · ':'')+ec(u.piano,'UNITA.'+k+'.piano','text')+'</div></td>'+
              '<td class="num" style="font-size:.85rem;color:var(--mid)">'+ecn(u.mill,'UNITA.'+k+'.mill',2)+'</td>'+
              '<td class="num" style="font-size:.85rem;color:var(--mid)">'+n(r.cons)+'</td>'+
              '<td class="num"><span style="font-size:.85rem;color:var(--mid);font-weight:600">'+eu(r.qF)+'</span></td>'+
              '<td class="num"><span style="font-size:.85rem;color:var(--mid);font-weight:600">'+eu(r.qC)+'</span></td>'+
              '<td class="num"><span style="font-size:.92rem;font-weight:900;color:var(--blue)">'+eu(r.tot)+'</span></td>'+
              (hasPrev?'<td class="num" style="padding:6px 10px">'+(d!==null?
                '<div style="display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:12px;white-space:nowrap;'+
                  'background:'+(d>0?'var(--red-bg)':'var(--green-bg)')+';border:1px solid '+(d>0?'#fca5a5':'#86efac')+'">'+
                  '<span style="font-size:.78rem;font-weight:800;color:'+(d>0?'var(--red)':'var(--green)')+'">'+(d>0?'▲':'▼')+' '+eu(Math.abs(Math.round(d*100)/100))+'</span>'+
                  '<span style="font-size:.68rem;color:'+(d>0?'#dc2626':'#16a34a')+'">('+(dpct>0?'+':'')+dpct+'%)</span>'+
                '</div>':
                '<span style="color:var(--muted)">—</span>')+'</td>':'')+
            '</tr>';
          }).join('')+
        '</tbody>'+
      '</table>'+
      // FOOTER TOTALE CONDOMINIALE
      '<div style="padding:10px 14px;background:#0D1F35;display:grid;grid-template-columns:1fr repeat(4,auto);gap:18px;align-items:center">'+
        '<div style="font-size:.78rem;color:rgba(255,255,255,.55)">'+Object.keys(UNITA).length+' unità</div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:.68rem;letter-spacing:.02em;color:rgba(255,255,255,.55);margin-bottom:1px">Millesimi</div>'+
          '<div style="font-size:.88rem;font-weight:600;color:rgba(255,255,255,.8)">'+n(st.mill_tot,2)+'</div></div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:.68rem;letter-spacing:.02em;color:rgba(255,255,255,.55);margin-bottom:1px">Q. Fissa</div>'+
          '<div style="font-size:.88rem;font-weight:700;color:rgba(255,255,255,.8)">'+eu(st.q_fissa)+'</div></div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:.68rem;letter-spacing:.02em;color:rgba(255,255,255,.55);margin-bottom:1px">Q. Consumo</div>'+
          '<div style="font-size:.88rem;font-weight:700;color:rgba(255,255,255,.8)">'+eu(st.q_consumo)+'</div></div>'+
        '<div style="text-align:right">'+
          '<div style="font-size:.68rem;letter-spacing:.02em;color:rgba(255,255,255,.55);margin-bottom:1px">Totale '+STATE.season+'</div>'+
          '<div style="font-size:1.1rem;font-weight:900;color:#fff">'+eu(st.tot)+'</div></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}


// ═══════════════════════════════════════════════════
// VIEW: CONTEGGI INDIVIDUALI — bolletta singola one-page
// ═══════════════════════════════════════════════════
function viewConteggio(){
  var c=STATE.condo;
  if(!Object.keys(UNITA).length) return '<div><div class="kicker">'+c.id+' · '+c.nome+'</div><h1 class="page-title">Conteggi Individuali</h1><div class="alert a-info mt16">Nessuna unità mappata. <a href="#" onclick="nav(\'mappatura\');return false" style="color:var(--blue)">Vai alla mappatura</a> per iniziare.</div></div>';
  var st=STAGIONI[STATE.season]||{tot:0,combustibile:0,elettricita:0,accessori:0,quota_fissa_pct:30,q_fissa:0,q_consumo:0,mill_tot:1000,punti_lordi:0,punti_netti:0,costo_mill:0,costo_punto:0};
  var rips=RIPARTO[STATE.season]||{};
  var uKeys=Object.keys(UNITA);
  var selU=STATE.contUnit||uKeys[0];
  var u=UNITA[selU];
  var r=rips[selU]||{};
  var devs=MAPPATURA[selU]||[];
  var letture=LETTURE[STATE.season]||{};
  var prev_season=String(parseInt(STATE.season)-1);
  var rip_prev=(RIPARTO[prev_season]||{})[selU]||{};
  var idx=uKeys.indexOf(selU);

  // max consumo per barra relativa
  var maxCF=Math.max.apply(null,devs.map(function(d){
    return Math.round((letture[d.ser]||0)*(KC[d.ser]||0));
  }))||1;

  // percentuali composizione
  var pctF=r.tot?Math.round(r.qF/(r.tot)*100):0;
  var pctC=r.tot?100-pctF:0;

  // ── SELETTORE UNITÀ (no-print) ──
  var unitSel='<div class="no-print" style="display:flex;align-items:center;gap:10px;margin-bottom:14px;background:var(--white);'+
    'border:1px solid var(--border);border-radius:10px;padding:11px 14px">'+
    '<label style="font-size:.6rem;font-weight:700;letter-spacing:.02em;color:var(--muted);white-space:nowrap">Condomino</label>'+
    '<select class="inp" onchange="STATE.contUnit=this.value;render()" style="flex:1;min-width:0">'+
      uKeys.map(function(k){return '<option value="'+k+'"'+(k===selU?' selected':'')+'>'+k+' — '+UNITA[k].nome+'</option>';}).join('')+
    '</select>'+
    '<button class="btn btn-sec btn-sm" onclick="prevCont()" '+(idx===0?'disabled':'')+'>← Prec.</button>'+
    '<button class="btn btn-sec btn-sm" onclick="nextCont()" '+(idx===uKeys.length-1?'disabled':'')+'>Succ. →</button>'+
    '<span style="font-size:.71rem;color:var(--muted);white-space:nowrap;flex-shrink:0">'+(idx+1)+' / '+uKeys.length+'</span>'+
  '</div>';

  // ── DELTA anno precedente ──
  var deltaHtml='';
  if(rip_prev.tot){
    var d=r.tot-rip_prev.tot;
    var isUp=d>0;
    deltaHtml='<span class="boll-delta" style="background:'+(isUp?'rgba(239,68,68,.12)':'rgba(34,197,94,.12)')+';color:'+(isUp?'var(--red)':'var(--green)')+'">'+
      (isUp?'▲ +':'▼ ')+eu(Math.abs(Math.round(d*100)/100))+' vs '+prev_season+
    '</span>';
  }

  // ══════════════════════════════════════════════
  // BUILD BOLLETTA PAGE
  // ══════════════════════════════════════════════
  return '<div>'+

    // Page header (no-print, screen only)
    '<div class="fjb mb12 no-print">'+
      '<div><div class="kicker">'+c.id+' · Conteggio Individuale</div>'+
      '<h1 class="page-title">Bollette Riscaldamento</h1>'+
      '<p class="page-sub">Scheda individuale per condomino · Stagione '+STATE.season+'</p></div>'+
    '</div>'+

    unitSel+

    // ═══════════ BOLLETTA SINGOLA START ═══════════
    '<div class="boll-page">'+

      // ── PDF Header ──
      '<div class="pdf-header">'+
        '<div class="pdf-logo-area"><img src="'+LOGO_LIGHT+'" style="height:42px" alt="Ulteria"></div>'+
        '<div><div class="pdf-doc-title">Conteggio Individuale</div>'+
          '<div class="pdf-doc-sub">'+c.nome+' · '+c.via+', '+c.loc+' · Stag. '+STATE.season+'</div></div>'+
      '</div>'+

      // ── HERO: Codice + Nome + Totale ──
      '<div class="boll-hero">'+
        // Codice utenza
        '<div class="boll-code">'+selU+'<div class="boll-code-sub">Cod. utenza</div></div>'+
        // Nominativo + meta
        '<div>'+
          '<div class="boll-name">'+u.nome+'</div>'+
          '<div class="boll-meta">'+c.nome+' · '+c.via+', '+c.loc+' · Amm. '+c.admin+'</div>'+
        '</div>'+
        // Importo totale
        '<div class="boll-total-wrap">'+
          '<div class="boll-total-label">Spesa totale</div>'+
          '<div class="boll-total-num">'+eu(r.tot)+'</div>'+
          '<div class="boll-total-season">Stagione '+STATE.season+deltaHtml+'</div>'+
        '</div>'+
      '</div>'+

      // ── INFO STRIP: dati utenza compatti ──
      '<div class="boll-info-strip">'+
        '<div class="boll-info-item"><div class="boll-info-label">Scala / Piano</div><div class="boll-info-val">'+(u.scala||'—')+' · '+u.piano+'</div></div>'+
        '<div class="boll-info-item"><div class="boll-info-label">Millesimi</div><div class="boll-info-val">'+n(u.mill,2)+' / 1.000</div></div>'+
        '<div class="boll-info-item"><div class="boll-info-label">Apparecchi</div><div class="boll-info-val">'+devs.length+'</div></div>'+
        '<div class="boll-info-item"><div class="boll-info-label">Punti consumo</div><div class="boll-info-val">'+n(r.cons)+'</div></div>'+
        '<div class="boll-info-item"><div class="boll-info-label">Quota fissa '+st.quota_fissa_pct+'%</div><div class="boll-info-val" style="color:var(--blue-d)">'+eu(r.qF)+'</div></div>'+
        '<div class="boll-info-item"><div class="boll-info-label">Quota consumo '+(100-st.quota_fissa_pct)+'%</div><div class="boll-info-val" style="color:var(--blue)">'+eu(r.qC)+'</div></div>'+
      '</div>'+

      // ── COMPOSIZIONE BARRA ──
      '<div class="boll-composition">'+
        '<div style="font-size:.6rem;font-weight:700;letter-spacing:.02em;color:var(--muted);white-space:nowrap">Composizione</div>'+
        '<div class="boll-comp-bar">'+
          '<div class="boll-comp-seg" style="width:'+pctF+'%;background:var(--blue-d)">'+(pctF>12?'<span>'+pctF+'%</span>':'')+'</div>'+
          '<div class="boll-comp-seg" style="flex:1;background:var(--blue)"><span>'+pctC+'%</span></div>'+
        '</div>'+
        '<div class="boll-comp-legend">'+
          '<div class="fac gap6"><div class="boll-comp-dot" style="background:var(--blue-d)"></div>Fissa '+eu(r.qF)+'</div>'+
          '<div class="fac gap6"><div class="boll-comp-dot" style="background:var(--blue)"></div>Consumo '+eu(r.qC)+'</div>'+
        '</div>'+
      '</div>'+

      // ── TABELLA RADIATORI ──
      '<div style="border:1px solid var(--border);border-radius:10px;overflow:hidden">'+
        '<table class="boll-tbl">'+
          '<thead><tr>'+
            '<th style="width:36px">#</th>'+
            '<th>Locale</th>'+
            '<th style="width:100px">Nr. serie</th>'+
            '<th class="r" style="width:60px">Display</th>'+
            '<th class="r" style="width:65px">KC</th>'+
            '<th class="r" style="width:70px">Consumo</th>'+
            '<th class="r" style="width:80px">Importo</th>'+
          '</tr></thead>'+
          '<tbody>'+
            devs.map(function(d,i){
              var disp=letture[d.ser]||0;
              var kc=KC[d.ser]||0;
              var cf=Math.round(disp*kc);
              var imp=+(cf*st.costo_punto).toFixed(2);
              var isZero=disp===0;

              return '<tr class="'+(isZero?'zero-row':'')+'">'+
                '<td style="font-weight:700;color:var(--muted);font-size:.7rem;text-align:center">'+(i+1)+'</td>'+
                '<td style="font-weight:700;font-size:.82rem;color:'+(isZero?'var(--muted)':'var(--mid)')+'">'+d.locale+'</td>'+
                '<td><span class="mono">'+d.ser+'</span></td>'+
                '<td class="num">'+(isZero?
                  '<span style="color:#d97706;font-weight:700">0 ⚠</span>':
                  '<span style="font-weight:700">'+disp+'</span>')+
                '</td>'+
                '<td class="num" style="font-size:.7rem;color:var(--blue)">'+kc.toFixed(4)+'</td>'+
                '<td class="num '+(isZero?'':'num-bold')+'">'+(isZero?'—':n(cf))+'</td>'+
                '<td class="num '+(isZero?'':'num-eur')+'">'+(isZero?'—':eu(imp))+'</td>'+
              '</tr>';
            }).join('')+
          '</tbody>'+
        '</table>'+

        // ── FOOTER TOTALE ──
        '<div class="boll-footer-bar">'+
          '<div style="font-size:.78rem;font-weight:600;opacity:.7">'+
            selU+' · '+u.nome+' · '+devs.length+' app.'+
          '</div>'+
          '<div><div class="boll-footer-label">Consumo</div><div class="boll-footer-val">'+n(r.cons)+' pt</div></div>'+
          '<div><div class="boll-footer-label">Q. fissa</div><div class="boll-footer-val">'+eu(r.qF)+'</div></div>'+
          '<div class="boll-footer-tot"><div class="boll-footer-label">Totale '+STATE.season+'</div><div class="boll-footer-val">'+eu(r.tot)+'</div></div>'+
        '</div>'+
      '</div>'+

      // ── NOTE COMPATTE ──
      '<div class="boll-note">'+
        '<strong style="color:var(--mid)">Nota:</strong> '+
        'Q. fissa ('+st.quota_fissa_pct+'%) su millesimi — Q. consumo ('+(100-st.quota_fissa_pct)+'%) su punti (display × KC).'+
        ' Costo/mill: € '+st.costo_mill.toFixed(4)+' · Costo/pt: € '+st.costo_punto.toFixed(4)+
        ' · Totale impianto: '+eu(st.tot)+'.'+
      '</div>'+

    '</div>'+
    // ═══════════ BOLLETTA SINGOLA END ═══════════

  '</div>';
}

function prevCont(){
  var keys=Object.keys(UNITA); var i=keys.indexOf(STATE.contUnit||keys[0]);
  STATE.contUnit=keys[(i-1+keys.length)%keys.length]; render();
}
function nextCont(){
  var keys=Object.keys(UNITA); var i=keys.indexOf(STATE.contUnit||keys[0]);
  STATE.contUnit=keys[(i+1)%keys.length]; render();
}

// ═══════════════════════════════════════════════════
// VIEW: STORICO & CONFRONTO
// ═══════════════════════════════════════════════════
function viewStorico(){
  var c=STATE.condo;

  return '<div>'+
    '<div class="fjb mb20">'+
      '<div><div class="kicker">'+c.id+' · '+c.nome+'</div>'+
      '<h1 class="page-title">Storico & Confronto</h1>'+
      '<p class="page-sub">Andamento stagionale · Confronto consumi e spese</p></div>'+
    '</div>'+

    // KPI stagioni
    '<div class="g3 mb20">'+
      STORICO.slice().reverse().map(function(yr){
        var st=STAGIONI[yr]||{}; var isActive=yr===STATE.season;
        return '<div class="card" style="'+(isActive?'border-color:var(--blue);background:var(--blue-l)':'')+'" onclick="changeSeason(\''+yr+'\');document.getElementById(\'season-sel\').value=\''+yr+'\'">'+
          '<div class="fac gap8 mb8">'+
            '<span style="font-size:1.2rem;font-weight:800;letter-spacing:-.025em;color:'+(isActive?'var(--blue)':'var(--text)')+'">'+yr+'</span>'+

          '<div style="font-size:.77rem;color:var(--mid);margin-bottom:12px">Stagione riscaldamento annuale</div>'+

        '<th>Cod.</th><th>Utente</th><th class="r">Mill.</th>'+
        STORICO.map(function(yr){return '<th class="r">'+yr+'</th>';}).join('')+
        '<th class="r">Variaz. '+STORICO[STORICO.length-1]+'/'+STORICO[0]+'</th>'+
      '</tr></thead>'+
      '<tbody>'+Object.keys(UNITA).map(function(k){

              '<div style="font-family:inherit;font-size:.75rem;font-weight:700;margin-bottom:3px">'+eu(v.tot)+'</div>'+

    // Andamento economico
    '<div class="card">'+
      '<div class="sec-ttl">Andamento economico stagionale</div>'+
      '<div style="display:flex;align-items:flex-end;gap:16px;height:160px;padding-bottom:8px">'+
        STORICO.map(function(yr){
          var st=STAGIONI[yr]||{}; var maxVal=24000;
          var pctC=Math.round((st.combustibile||0)/maxVal*100);
          var pctE=Math.round((st.elettricita||0)/maxVal*100);
          var pctA=Math.round((st.accessori||0)/maxVal*100);
          var isActive=yr===STATE.season;
          return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">'+
            '<div style="font-family:inherit;font-size:.7rem;font-weight:700;color:'+(isActive?'var(--blue)':'var(--mid)')+'">'+eu(st.tot)+'</div>'+
            '<div style="width:100%;display:flex;flex-direction:column;justify-content:flex-end;gap:2px;height:120px">'+
              '<div style="width:100%;height:'+pctA+'%;background:var(--orange);border-radius:3px 3px 0 0;min-height:3px"></div>'+
              '<div style="width:100%;height:'+pctE+'%;background:var(--green);min-height:3px"></div>'+
              '<div style="width:100%;height:'+pctC+'%;background:var(--blue);border-radius:0;min-height:20px"></div>'+
            '</div>'+
            '<div style="font-size:.75rem;font-weight:'+(isActive?"800":"600")+';color:'+(isActive?'var(--blue)':'var(--mid)')+'">'+yr+'</div>'+
          '</div>';
        }).join('')+
      '</div>'+
      '<div class="fac gap12 mt12">'+
        [["var(--blue)","Combustibile"],["var(--green)","Energia el."],["var(--orange)","Accessori"]].map(function(l){
          return '<div class="fac gap5" style="font-size:.72rem;color:var(--mid)">'+
            '<div style="width:10px;height:10px;border-radius:2px;background:'+l[0]+';flex-shrink:0"></div>'+l[1]+'</div>';
        }).join('')+
      '</div>'+
    '</div>'+
  '</div>';
}

// ═══════════════════════════════════════════════════
// DOCUMENT CENTER — stato documentale persistente
// ═══════════════════════════════════════════════════
var DOC_TYPES = [
  {id:'lettura',     nome:'Lettura consumi',          tipo:'PDF', dest:'esterno',  nav:'letture'},
  {id:'riparto',     nome:'Ripartizione generale',    tipo:'PDF', dest:'esterno',  nav:'ripartizione'},
  {id:'conteggi',    nome:'Conteggi individuali',     tipo:'PDF', dest:'esterno',  nav:'conteggio'},
  {id:'install',     nome:'Report installazione',     tipo:'PDF', dest:'interno',  nav:'installazione'},
  {id:'export_csv',  nome:'Export letture CSV',       tipo:'CSV', dest:'interno',  nav:null},
  {id:'export_vendor',nome:'Export vendor / piattaforma',tipo:'CSV',dest:'interno',nav:null},
  {id:'verbale',     nome:'Verbale di lettura',       tipo:'PDF', dest:'interno',  nav:null},
];

function docGetStore(){
  var d=CONDO_DATA[_activeCondoId];
  if(!d) return {};
  if(!d.documenti) d.documenti={};
  return d.documenti;
}

function docGetSeason(season){
  var store=docGetStore();
  if(!store[season]){
    store[season]={};
    DOC_TYPES.forEach(function(dt){
      store[season][dt.id]={
        stato:'non_generato',
        versione:0,
        inviato:false,
        inviato_at:null,
        dest:dt.dest,
        tipo:dt.tipo,
        storico:[]
      };
    });
  }
  return store[season];
}

function docGet(season,docType){
  var s=docGetSeason(season);
  if(!s[docType]){
    var dt=DOC_TYPES.filter(function(d){return d.id===docType;})[0]||{};
    s[docType]={stato:'non_generato',versione:0,inviato:false,inviato_at:null,dest:dt.dest||'interno',tipo:dt.tipo||'PDF',storico:[]};
  }
  return s[docType];
}

function docTimestamp(){
  var d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+
    String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

function docGenera(season,docType){
  var doc=docGet(season,docType);
  doc.versione=doc.versione+1;
  doc.stato='generato';
  doc.inviato=false;
  doc.inviato_at=null;
  doc.storico.push({versione:doc.versione,azione:'generato',ts:docTimestamp()});
  render();
}

function docRigenera(season,docType){
  var doc=docGet(season,docType);
  doc.versione=doc.versione+1;
  doc.stato='generato';
  doc.inviato=false;
  doc.inviato_at=null;
  doc.storico.push({versione:doc.versione,azione:'rigenerato',ts:docTimestamp()});
  render();
}

function docSegnaInviato(season,docType){
  var doc=docGet(season,docType);
  var ts=docTimestamp();
  doc.stato='inviato';
  doc.inviato=true;
  doc.inviato_at=ts;
  doc.storico.push({versione:doc.versione,azione:'inviato',ts:ts});
  render();
}

// Seed Carloni demo docs
(function(){
  var store=CONDO_DATA["CK25035"].documenti;
  if(!store) store=CONDO_DATA["CK25035"].documenti={};
  ["2023","2024","2025"].forEach(function(yr){
    store[yr]={};
    DOC_TYPES.forEach(function(dt){
      var isOld=yr!=="2025";
      var isRip=dt.id==='riparto'||dt.id==='conteggi';
      store[yr][dt.id]={
        stato:isOld?'inviato':(dt.id==='lettura'?'generato':isRip?'non_generato':'non_generato'),
        versione:isOld?2:(dt.id==='lettura'?1:0),
        inviato:isOld,
        inviato_at:isOld?yr+'-10-15 09:30':null,
        dest:dt.dest,
        tipo:dt.tipo,
        storico:isOld?[
          {versione:1,azione:'generato',ts:yr+'-09-20 14:00'},
          {versione:2,azione:'rigenerato',ts:yr+'-10-05 11:30'},
          {versione:2,azione:'inviato',ts:yr+'-10-15 09:30'}
        ]:(dt.id==='lettura'?[
          {versione:1,azione:'generato',ts:'2025-03-28 09:14'}
        ]:[])
      };
    });
  });
})();

var DOC_STATO_BADGE={
  generato:{badge:'b-green',label:'Generato'},
  non_generato:{badge:'b-gray',label:'Non generato'},
  da_rigenerare:{badge:'b-orange',label:'Da rigenerare'},
  inviato:{badge:'b-blue',label:'Inviato'},
  non_previsto:{badge:'b-gray',label:'Non previsto'},
};

function viewArchivio(){
  var c=STATE.condo;
  var nUnita=Object.keys(UNITA).length;

  return '<div>'+
    '<div class="fjb mb20">'+
      '<div><div class="kicker">'+c.id+' · '+c.nome+'</div>'+
      '<h1 class="page-title">Document Center</h1>'+
      '<p class="page-sub">Gestione documenti e output per stagione</p></div>'+
    '</div>'+

    '<div style="display:flex;gap:12px;margin-bottom:16px;font-size:.75rem">'+
      '<span style="color:var(--muted)">Legenda:</span>'+
      '<span class="badge b-green" style="font-size:.6rem">Generato</span>'+
      '<span class="badge b-gray" style="font-size:.6rem">Non generato</span>'+
      '<span class="badge b-orange" style="font-size:.6rem">Da rigenerare</span>'+
      '<span class="badge b-blue" style="font-size:.6rem">Inviato</span>'+
      '<span style="color:var(--muted);font-size:.7rem">· EST = esterno · INT = interno</span>'+
    '</div>'+

    STORICO.slice().reverse().map(function(yr){
      var isActive=yr===STATE.season;
      var seasonDocs=docGetSeason(yr);
      var nGen=DOC_TYPES.filter(function(dt){var d=seasonDocs[dt.id];return d&&(d.stato==='generato'||d.stato==='inviato');}).length;

      return '<div class="card mb12" style="padding:0;overflow:hidden">'+
        '<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">'+
          '<div class="fac gap10">'+
            '<div style="width:36px;height:36px;border-radius:8px;background:'+(isActive?'var(--blue)':'var(--bg)')+';display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;color:'+(isActive?'#fff':'var(--mid)')+'">'+yr+'</div>'+
            '<div>'+
              '<div style="font-weight:700;font-size:.85rem">Stagione '+yr+(isActive?' <span class="badge b-blue" style="font-size:.55rem">corrente</span>':'')+'</div>'+
              '<div style="font-size:.7rem;color:var(--muted)">'+nGen+'/'+DOC_TYPES.length+' documenti generati</div>'+
            '</div>'+
          '</div>'+
          (isActive?'<span class="badge b-green" style="font-size:.6rem">Attiva</span>':'<span class="badge b-gray" style="font-size:.6rem">Chiusa</span>')+
        '</div>'+
        '<table style="width:100%;border-collapse:collapse">'+
          '<thead><tr style="background:var(--bg)">'+
            '<th style="text-align:left;padding:6px 16px;font-size:.7rem;font-weight:700;color:var(--muted)">Documento</th>'+
            '<th style="width:50px;text-align:center;padding:6px 8px;font-size:.7rem;font-weight:700;color:var(--muted)">Tipo</th>'+
            '<th style="width:50px;text-align:center;padding:6px 8px;font-size:.7rem;font-weight:700;color:var(--muted)">Dest.</th>'+
            '<th style="width:100px;text-align:center;padding:6px 8px;font-size:.7rem;font-weight:700;color:var(--muted)">Stato</th>'+
            '<th style="width:55px;text-align:center;padding:6px 8px;font-size:.7rem;font-weight:700;color:var(--muted)">Vers.</th>'+
            '<th style="width:180px;text-align:right;padding:6px 16px;font-size:.7rem;font-weight:700;color:var(--muted)">Azioni</th>'+
          '</tr></thead>'+
          '<tbody>'+
            DOC_TYPES.map(function(dt){
              var doc=seasonDocs[dt.id]||{stato:'non_generato',versione:0,inviato:false,storico:[]};
              var sb=DOC_STATO_BADGE[doc.stato]||DOC_STATO_BADGE.non_generato;
              var isGen=doc.stato==='generato'||doc.stato==='inviato';
              var nome=dt.nome+(dt.id==='conteggi'&&nUnita?' (×'+nUnita+')':'');
              var lastEvent=doc.storico.length?doc.storico[doc.storico.length-1]:null;

              return '<tr style="border-bottom:1px solid var(--border)">'+
                '<td style="padding:8px 16px">'+
                  '<div style="font-size:.82rem;font-weight:600;color:var(--text)">'+nome+'</div>'+
                  (lastEvent?'<div style="font-size:.65rem;color:var(--muted);margin-top:1px">v'+lastEvent.versione+' · '+lastEvent.azione+' · '+lastEvent.ts+'</div>':'')+
                '</td>'+
                '<td style="text-align:center;padding:8px;font-size:.7rem;font-weight:700;color:var(--muted)">'+dt.tipo+'</td>'+
                '<td style="text-align:center;padding:8px"><span style="font-size:.62rem;font-weight:700;color:'+(dt.dest==='esterno'?'var(--blue)':'var(--muted)')+'">'+(dt.dest==='esterno'?'EST':'INT')+'</span></td>'+
                '<td style="text-align:center;padding:8px"><span class="badge '+sb.badge+'" style="font-size:.58rem">'+sb.label+'</span>'+
                  (doc.inviato&&doc.inviato_at?'<div style="font-size:.58rem;color:var(--muted);margin-top:1px">'+doc.inviato_at+'</div>':'')+
                '</td>'+
                '<td style="text-align:center;padding:8px;font-size:.78rem;color:var(--mid);font-weight:700">'+(doc.versione||'—')+'</td>'+
                '<td style="text-align:right;padding:8px 16px">'+
                  '<div style="display:flex;gap:4px;justify-content:flex-end;flex-wrap:wrap">'+
                    (!isGen?'<button class="btn btn-primary btn-sm" onclick="docGenera(\''+yr+'\',\''+dt.id+'\')" style="font-size:.68rem;padding:3px 8px">Genera</button>':'')+
                    (isGen&&dt.nav?'<button class="btn btn-sec btn-sm" onclick="nav(\''+dt.nav+'\')" style="font-size:.68rem;padding:3px 8px">Anteprima</button>':'')+
                    (isGen&&!doc.inviato?'<button class="btn btn-sec btn-sm" onclick="docSegnaInviato(\''+yr+'\',\''+dt.id+'\')" style="font-size:.68rem;padding:3px 8px">Inviato</button>':'')+
                    (isGen?'<button class="btn btn-sec btn-sm" onclick="docRigenera(\''+yr+'\',\''+dt.id+'\')" style="font-size:.68rem;padding:3px 8px">Rigenera</button>':'')+
                  '</div>'+
                '</td>'+
              '</tr>';
            }).join('')+
          '</tbody>'+
        '</table>'+

        // Storico versioni collapsible
        (function(){
          var allEvents=[];
          DOC_TYPES.forEach(function(dt){
            var doc=seasonDocs[dt.id];
            if(doc&&doc.storico){
              doc.storico.forEach(function(ev){
                allEvents.push({doc:dt.nome,versione:ev.versione,azione:ev.azione,ts:ev.ts});
              });
            }
          });
          if(!allEvents.length) return '';
          allEvents.sort(function(a,b){return b.ts.localeCompare(a.ts);});
          return '<div style="padding:8px 16px;border-top:1px solid var(--border);background:var(--bg)">'+
            '<div style="font-size:.7rem;font-weight:700;color:var(--muted);margin-bottom:4px">Storico eventi ('+allEvents.length+')</div>'+
            allEvents.slice(0,6).map(function(ev){
              return '<div style="display:flex;gap:8px;font-size:.72rem;padding:2px 0;color:var(--mid)">'+
                '<span style="color:var(--muted);min-width:110px">'+ev.ts+'</span>'+
                '<span style="font-weight:600;min-width:70px">v'+ev.versione+'</span>'+
                '<span>'+ev.doc+' — '+ev.azione+'</span>'+
              '</div>';
            }).join('')+
            (allEvents.length>6?'<div style="font-size:.68rem;color:var(--muted);padding:2px 0">e altri '+(allEvents.length-6)+' eventi…</div>':'')+
          '</div>';
        })()+

      '</div>';
    }).join('')+
  '</div>';
}
